name: Build BD Mobile Compat

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Vérifier le ZIP
        run: |
          if [ ! -f "BDMobileCompat-GitHub-ready.zip" ]; then
            echo "ERREUR : BDMobileCompat-GitHub-ready.zip est absent."
            exit 1
          fi

      - name: Décompresser le projet
        run: |
          rm -rf project
          mkdir project
          unzip -q BDMobileCompat-GitHub-ready.zip -d project

          if [ ! -f "project/package.json" ]; then
            echo "ERREUR : package.json est absent."
            exit 1
          fi

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installer les dépendances
        working-directory: project
        run: npm install

      - name: Vérifier le TypeScript
        working-directory: project
        run: npm run typecheck

      - name: Compiler et tester
        working-directory: project
        run: npm test

      - name: Préparer le paquet Revenge
        run: |
          rm -rf release
          mkdir release

          cp project/repo.json release/repo.json
          cp -R project/builds release/builds

          cd release
          zip -r ../BDMobileCompat-Revenge.zip .

      - name: Envoyer le fichier compilé
        uses: actions/upload-artifact@v4
        with:
          name: BDMobileCompat-Revenge
          path: BDMobileCompat-Revenge.zip
          if-no-files-found: error
