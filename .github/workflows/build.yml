name: Build BD Mobile Compat

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: bd-mobile-compat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Vérifier le ZIP
        run: |
          echo "Fichiers présents dans le dépôt :"
          ls -la

          if [ ! -f "BDMobileCompat-GitHub-ready.zip" ]; then
            echo "ERREUR : BDMobileCompat-GitHub-ready.zip est absent."
            echo "Ajoute le ZIP à la racine du dépôt sans le renommer."
            exit 1
          fi

      - name: Décompresser le projet
        run: |
          rm -rf project
          mkdir project

          unzip -q BDMobileCompat-GitHub-ready.zip -d project

          echo "Contenu du projet :"
          find project -maxdepth 3 -type f | sort

          if [ ! -f "project/package.json" ]; then
            echo "ERREUR : package.json est absent du ZIP."
            exit 1
          fi

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installer les dépendances
        working-directory: project
        run: npm install

      - name: Vérifier le TypeScript
        working-directory: project
        run: npm run typecheck

      - name: Compiler et tester
        working-directory: project
        run: npm test

      - name: Préparer le paquet Revenge
        run: |
          rm -rf release public
          mkdir -p release public

          cp project/repo.json release/repo.json
          cp -R project/builds release/builds

          cp project/repo.json public/repo.json
          cp -R project/builds public/builds

          cd release
          zip -r ../BDMobileCompat-Revenge.zip .

      - name: Envoyer le fichier compilé
        uses: actions/upload-artifact@v4
        with:
          name: BDMobileCompat-Revenge
          path: BDMobileCompat-Revenge.zip
          if-no-files-found: error

      - name: Configurer GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Préparer GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publier le dépôt Revenge
        id: deployment
        uses: actions/deploy-pages@v4
